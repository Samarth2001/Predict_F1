  # Feature governance
  governance:
    allowlists:
      qualifying: []
      race: []
    per_event_zscore:
      enabled: false

  # Rolling window hygiene
  rolling_windows_hygiene:
    drop_partial_windows: true

  weather_forecast:
    use_openweathermap: true
    hours_ahead: 24

  # Scenario gate to prune leakage-prone columns in pre-quali modes
  scenario_gate:
    enabled: true
    pre_quali_drop:
      - Grid_Delta
      - Adj_Grid_Delta
      - Teammate_Gap_Race_short

  # Feature caching
  cache:
    enabled: true

  # Canonicalization maps to stabilize entity names across seasons
  canonicalization:
    drivers: {}
    teams: {}
    circuits: {}

  # Join guardrails to prevent silent mismatches/leakage
  join_guard:
    enabled: true
    max_unmatched_ratio: 0.02  # 2% of left rows unmatched triggers action
    on_violation: "warn"       # options: warn, error
models:
  # 'ensemble' is recommended for best performance
  default_model_type: "ensemble"
  available:
    [
      "lightgbm",
      "xgboost",
      "random_forest",
      "ensemble",
      "lightgbm_ranker",
      "xgboost_ranker",
    ]

  # Per-target overrides
  qualifying:
    use_ranking: true
    base_models: ["lightgbm_ranker", "xgboost_ranker"]
    overrides: {}
  race:
    use_ranking: true
    enable_dnf_model: true
    default_dnf_position: 20
    base_models: ["lightgbm_ranker", "xgboost_ranker"]
    overrides: {}

  # Parameters for individual models
  lightgbm_params:
    objective: "regression_l1"
    metric: "mae"
    n_estimators: 2000
    learning_rate: 0.02
    feature_fraction: 0.8
    bagging_fraction: 0.8
    bagging_freq: 1
    lambda_l1: 0.1
    lambda_l2: 0.1
    num_leaves: 31
    verbose: -1
    n_jobs: -1
    seed: 42
    boosting_type: "gbdt"

  xgboost_params:
    objective: "reg:squarederror"
    eval_metric: "mae"
    n_estimators: 2000
    learning_rate: 0.02
    max_depth: 7
    subsample: 0.8
    colsample_bytree: 0.8
    gamma: 0.1
    random_state: 42
    n_jobs: -1

  random_forest_params:
    n_estimators: 500
    max_depth: 15
    min_samples_split: 5
    min_samples_leaf: 2
    random_state: 42
    n_jobs: -1

  neural_network_params:
    hidden_layer_sizes: [128, 64]
    activation: relu
    solver: adam
    alpha: 0.0001
    learning_rate_init: 0.001
    max_iter: 500
    early_stopping: false
    random_state: 42

  # Ranking models
  lightgbm_ranker_params:
    objective: "lambdarank"
    metric: "ndcg"
    n_estimators: 1500
    learning_rate: 0.05
    num_leaves: 63
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.1
    reg_lambda: 0.1
    n_jobs: -1
    verbose: -1

  xgboost_ranker_params:
    objective: "rank:pairwise"
    eval_metric: "ndcg"
    n_estimators: 1500
    learning_rate: 0.05
    max_depth: 7
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.1
    reg_lambda: 0.1
    n_jobs: -1
    random_state: 42

  # Classification models for DNF
  lightgbm_classifier_params:
    objective: "binary"
    metric: "auc"
    n_estimators: 1000
    learning_rate: 0.05
    num_leaves: 63
    subsample: 0.8
    colsample_bytree: 0.8
    n_jobs: -1
    verbose: -1

  xgboost_classifier_params:
    objective: "binary:logistic"
    eval_metric: "auc"
    n_estimators: 1000
    learning_rate: 0.05
    max_depth: 6
    subsample: 0.8
    colsample_bytree: 0.8
    n_jobs: -1
    random_state: 42

  # Configuration for the ensemble model
  ensemble_config:
    base_models: ["lightgbm", "xgboost", "neural_network"]
    # Weights will be optimized if optimize_weights is true
    weights: [0.5, 0.5]
    optimize_weights: true
    target_metric: spearman   # options: mae, spearman, ndcg
    random_weight_samples: 1000

training:
  # Configuration for train-validation-test split
  split_config:
    test_size: 0.15
    validation_size: 0.15
    time_aware_split: true
    stratify_by: ["Year"]

  # Configuration for cross-validation
  cv_config:
    cv_folds: 5
    cv_strategy: "time_series" # 'time_series' or 'stratified'
    cv_group_by: "Year"
    purged: true
    purge_events: 1
    embargo_events: 1

  # Configuration for model training process
  training_config:
    early_stopping_rounds: 100
    early_stopping_metric: "mae"
  collinearity:
    enabled: true
    threshold: 0.98
  outliers:
    enabled: true
    q_low: 0.001
    q_high: 0.999

  # Parallelization controls
  parallel:
    # n_jobs per fold to train base algorithms concurrently (-1 uses all cores)
    n_jobs_per_fold: -1
    # Whether to cap estimator-level threads when doing outer parallelism
    limit_estimator_threads: true
    estimator_n_jobs: 1

  ensemble:
    # Target metric for ensemble weight search during CV
    target_metric: mae  # options: mae, spearman, ndcg
    random_weight_samples: 1000
    dynamic_weights: true
    segment_keys: ["Circuit_Cluster", "Is_Sprint"]

hyperparameter_optimization:
  # Optional (requires installing Optuna). If Optuna is not installed, training will fall back to defaults.
  enabled: false
  n_trials: 300
  timeout_hours: 2
  objective_metric: "mae"  # options: mae, spearman
  optimization_direction: "minimize"
  seed: 42
  storage: null  # e.g., sqlite:///optuna.db
  n_jobs: 1  # parallelize trials per study; increase carefully to avoid oversubscription

  # Search spaces for hyperparameters
  param_search_spaces:
    lightgbm:
      n_estimators: [1000, 2000, 3000, 5000]
      learning_rate: [0.005, 0.01, 0.02, 0.05]
      max_depth: [5, 7, 9, 12, 15, -1]
      num_leaves: [31, 63, 127, 255]
      subsample: [0.6, 0.7, 0.8, 0.9]
      colsample_bytree: [0.6, 0.7, 0.8, 0.9]
      reg_alpha: [0.0, 0.1, 1.0, 5.0]
      reg_lambda: [0.0, 0.1, 1.0, 5.0]
    xgboost:
      n_estimators: [1000, 2000, 3000, 5000]
      learning_rate: [0.005, 0.01, 0.02, 0.05]
      max_depth: [5, 7, 9, 12, 15]
      subsample: [0.6, 0.7, 0.8, 0.9]
      colsample_bytree: [0.6, 0.7, 0.8, 0.9]
      reg_alpha: [0.0, 0.1, 1.0, 5.0]
      reg_lambda: [0.0, 0.1, 1.0, 5.0]

prediction:
  # Confidence thresholds for categorizing predictions
  confidence_thresholds:
    high: 0.80
    medium: 0.60
    low: 0.40
  calibration:
    uncertainty_method: "quantile"  # options: quantile, rank_residual_std
    use_quantile_models: true
    lower_quantile: 0.1
    upper_quantile: 0.9
    confidence_band_delta: 1.5 # fallback for std-based bands
  top_k_thresholds: [3, 10]

  # Default values for features if they are missing during prediction
  imputation_defaults:
    Grid_Pos: 15.0
    Quali_Pos: 15.0
    Weather_Temp: 25.0

evaluation:
  # Metrics to calculate for evaluating model performance
  metrics:
    [
      "mae",
      "rmse",
      "r2",
      "spearman_correlation",
      "top3_accuracy",
      "top5_accuracy",
    ]
  # Hold out one or more recent years for final testing
  holdout_years: [2024]
  # Number of iterations for bootstrap confidence intervals
  bootstrap_iterations: 1000
  # Rank metrics configuration
  rank_metrics:
    k_list: [3, 5, 10]
  # Calibration diagnostics
  calibration:
    n_bins: 10
    store_plots: true
  # Drift tracking thresholds
  drift:
    rolling_window_events: 6
    threshold_mae: 0.5
    threshold_spearman: 0.15

reliability:
  enable: true
  dnf_position: 20
  dnf_position_by_circuit: {}
  calibration:
    method: isotonic  # isotonic or sigmoid
